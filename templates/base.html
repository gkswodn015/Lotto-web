<!-- templates/base.html -->
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}로또{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

  <nav class="navbar navbar-dark bg-dark px-4">
    <a class="navbar-brand" href="/">🎱 6/45 로또</a>
    <div>
      {% if user.is_authenticated %}
        <span class="text-white me-3">{{ user.username }}님</span>
        <a href="{% url 'lottery:my_tickets' %}" class="btn btn-outline-light btn-sm me-2">내 티켓</a>
        <a href="{% url 'accounts:logout' %}"   class="btn btn-outline-light btn-sm">로그아웃</a>
      {% else %}
        <a href="{% url 'accounts:login' %}"    class="btn btn-outline-light btn-sm me-2">로그인</a>
        <a href="{% url 'accounts:register' %}" class="btn btn-light btn-sm">회원가입</a>
      {% endif %}
    </div>
  </nav>

  <div class="container mt-4">
    {% for msg in messages %}
      <div class="alert alert-{{ msg.tags }} alert-dismissible fade show">
        {{ msg }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
    {% endfor %}

    {% block content %}{% endblock %}
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
